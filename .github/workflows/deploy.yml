name: Build and Deploy to Docker Hub

on:
  push:
    branches: ["main"]

jobs:
  build-and-push-dockerfile-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create Docker Hub Repository if not exists
        env:
          USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          REPO: "trusmi-web"
        run: |
          # Get JWT token for API
          JWT=$(curl -s -H "Content-Type: application/json" -X POST -d '{"username": "'$USERNAME'", "password": "'$TOKEN'"}' https://hub.docker.com/v2/users/login/ | jq -r .token)
          
          # Try to create the repository (ignoring errors if it already exists)
          curl -s -o /dev/null -w "%{http_code}" -H "Authorization: JWT $JWT" -H "Content-Type: application/json" -X POST -d '{"name": "'$REPO'", "is_private": false, "description": "Trusmi Web Production Image"}' https://hub.docker.com/v2/repositories/$USERNAME/
          
          echo "Repository check/creation completed."

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          # Make sure to replace with your own namespace and repository
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/trusmi-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/trusmi-web:${{ github.sha }}
          platforms: linux/amd64

      # Optional: Jika ingin memicu deploy otomatis Dokploy via API, uncomment bagian ini
      # - name: Trigger Dokploy Deployment
      #   uses: dokploy/dokploy-action@v1
      #   run: |
      #     curl -X 'POST' \
      #       'https://<your-dokploy-domain>/api/application.deploy' \
      #       -H 'accept: application/json' \
      #       -H 'x-api-key: ${{ secrets.DOKPLOY_API_KEY }}' \
      #       -H 'Content-Type: application/json' \
      #       -d '{
      #       "applicationId": "YOUR-APPLICATION-ID"
      #     }'
